<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voca Plane</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center bg-gradient-to-br from-blue-50 to-white py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-3xl w-full text-center space-y-8">
        <h1 class="text-5xl font-extrabold text-gray-900 tracking-tight">
            Welcome to <span class="text-blue-600">Voca Plane</span>
        </h1>
        <p class="text-xl text-gray-500 max-w-2xl mx-auto">
            Your premium platform for booking flights. Manage your travels with ease, check in online, and access exclusive promos.
        </p>
        
        <div class="mt-10 flex flex-col sm:flex-row justify-center gap-4">
            <!-- For users to jump right into flight search -->
            <a href="/pages/user/flights.html" class="inline-flex items-center justify-center px-8 py-3 border border-transparent text-base font-medium rounded-md shadow-sm text-white bg-blue-600 hover:bg-blue-700 transition-colors">
                Search Flights
            </a>
            <a href="/pages/user/login.html" class="inline-flex items-center justify-center px-8 py-3 border border-gray-300 text-base font-medium rounded-md shadow-sm text-gray-700 bg-white hover:bg-gray-50 transition-colors">
                Sign In
            </a>
            <a href="/pages/user/register.html" class="inline-flex items-center justify-center px-8 py-3 border border-gray-300 text-base font-medium rounded-md shadow-sm text-gray-700 bg-white hover:bg-gray-50 transition-colors">
                Sign Up
            </a>
        </div>
    </div>
    
    <script type="module">
        import { getCookie } from './utils/cookie.js';
        
        // If already logged in, redirect to profile or flights directly could be an option,
        // but since this is a landing page, just keeping it simple.
        const token = getCookie('access_token');
        if (token) {
            // Replace the auth buttons with a "Go to Dashboard/Profile" button
            const container = document.querySelector('.mt-10');
            container.innerHTML = `
                <a href="/pages/user/flights.html" class="inline-flex items-center justify-center px-8 py-3 border border-transparent text-base font-medium rounded-md shadow-sm text-white bg-blue-600 hover:bg-blue-700 transition-colors">
                    Search Flights
                </a>
                <a href="/pages/user/profile.html" class="inline-flex items-center justify-center px-8 py-3 border border-gray-300 text-base font-medium rounded-md shadow-sm text-gray-700 bg-white hover:bg-gray-50 transition-colors">
                    My Dashboard
                </a>
            `;
        }
    </script>
</body>
</html>
