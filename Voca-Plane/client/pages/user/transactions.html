<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voca Plane - Transactions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <!-- Navbar -->
    <nav class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex">
                    <div class="flex-shrink-0 flex items-center">
                        <span class="text-xl font-bold text-blue-600">Voca Plane</span>
                    </div>
                    <div class="hidden sm:ml-6 sm:flex sm:space-x-8">
                        <a href="/pages/user/flights.html" class="border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">Search Flights</a>
                        <a href="#" class="border-blue-500 text-gray-900 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">My Bookings</a>
                        <a href="/pages/user/profile.html" class="border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">Profile</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <main class="flex-grow max-w-7xl mx-auto py-10 sm:px-6 lg:px-8 w-full">
        <div class="mb-4">
            <a href="/pages/user/profile.html" class="inline-flex items-center text-sm font-medium text-blue-600 hover:text-blue-500">
                &larr; Back to Profile
            </a>
        </div>
        <div class="bg-white shadow sm:rounded-lg">
            <div class="px-4 py-5 border-b border-gray-200 sm:px-6">
                <h3 class="text-lg leading-6 font-medium text-gray-900">Transaction History</h3>
            </div>
            <ul class="divide-y divide-gray-200" id="txList">
                <li class="px-4 py-8 text-center text-gray-500">Loading your transactions...</li>
            </ul>
        </div>
    </main>

    <script type="module">
        import { transactionService } from '../../services/transactionService.js';

        async function loadTransactions() {
            const list = document.getElementById('txList');
            try {
                const response = await transactionService.getUserTransactions();
                const txs = response.data || [];
                
                if (txs.length === 0) {
                    list.innerHTML = '<li class="px-4 py-8 text-center text-gray-500">No transactions found.</li>';
                    return;
                }

                list.innerHTML = '';
                txs.forEach(tx => {
                    const statusColor = getStatusColor(tx.payment_status);
                    
                    const li = document.createElement('li');
                    li.className = 'px-4 py-6 sm:px-6';
                    li.innerHTML = `
                        <div class="flex items-center justify-between mb-4">
                            <div>
                                <p class="text-sm font-medium text-gray-500">Order ID: <span class="text-gray-900 font-bold">${tx.code}</span></p>
                                <p class="text-xs text-gray-400 mt-1">${new Date(tx.created_at).toLocaleString()}</p>
                            </div>
                            <div>
                                <span class="px-3 py-1 inline-flex text-xs leading-5 font-semibold rounded-full ${statusColor}">${tx.payment_status.toUpperCase()}</span>
                            </div>
                        </div>
                        
                        <div class="bg-gray-50 rounded-lg p-4 border border-gray-100 flex justify-between items-center">
                            <div>
                                <p class="font-bold text-gray-900">${tx.flight.airline.name} <span class="text-gray-500 font-normal text-sm">${tx.flight.flight_number}</span></p>
                                <p class="text-sm text-gray-600 mt-1">
                                    ${tx.flight.origin.code} → ${tx.flight.destination.code}
                                </p>
                            </div>
                            <div class="text-right">
                                <p class="text-xs text-gray-500 mb-1">Total</p>
                                <p class="text-lg font-bold text-gray-900 flex flex-col justify-end items-end w-full whitespace-nowrap">Rp ${tx.total_price.toLocaleString()}</p>
                            </div>
                        </div>
                        
                        ${tx.payment_status === 'pending' || tx.payment_status === 'unpaid' ? `
                            <div class="mt-4 flex justify-end space-x-3 w-full border-t border-gray-100 pt-4">
                                <button onclick="cancelTx('${tx.code}')" class="inline-flex items-center px-3 py-1.5 border border-red-300 text-xs font-medium rounded-md shadow-sm text-red-700 bg-white hover:bg-red-50 focus:outline-none">
                                    Cancel
                                </button>
                                <a href="/pages/user/transaction-detail.html?code=${tx.code}" class="inline-flex items-center px-3 py-1.5 border border-transparent text-xs font-medium rounded-md shadow-sm text-white bg-blue-600 hover:bg-blue-700 focus:outline-none">
                                    Pay Now
                                </a>
                            </div>
                        ` : `
                            <div class="mt-4 flex justify-end w-full border-t border-gray-100 pt-4">
                                <a href="/pages/user/transaction-detail.html?code=${tx.code}" class="inline-flex items-center px-3 py-1.5 border border-gray-300 text-xs font-medium rounded-md shadow-sm text-gray-700 bg-white hover:bg-gray-50 focus:outline-none">
                                    View Details
                                </a>
                            </div>
                        `}
                    `;
                    list.appendChild(li);
                });
            } catch (error) {
                list.innerHTML = `<li class="px-4 py-8 text-center text-red-500">${error.message || 'Failed to load transactions.'}</li>`;
            }
        }

        // Global function for onclick
        window.cancelTx = async function(code) {
            if (confirm(`Are you sure you want to cancel booking ${code}?`)) {
                try {
                    await transactionService.cancelTransaction(code);
                    alert('Transaction cancelled successfully.');
                    loadTransactions(); // refresh
                } catch (error) {
                    alert(error.message || 'Failed to cancel.');
                }
            }
        };

        function getStatusColor(status) {
            switch(status.toLowerCase()) {
                case 'settlement':
                case 'capture':
                case 'success':
                case 'paid':
                    return 'bg-green-100 text-green-800';
                case 'pending':
                case 'unpaid':
                    return 'bg-yellow-100 text-yellow-800';
                case 'cancel':
                case 'deny':
                case 'expire':
                case 'failure':
                    return 'bg-red-100 text-red-800';
                default:
                    return 'bg-gray-100 text-gray-800';
            }
        }

        loadTransactions();
    </script>
</body>
</html>
