<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voca Plane - My Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <!-- Navbar -->
    <nav class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex">
                    <div class="flex-shrink-0 flex items-center">
                        <span class="text-xl font-bold text-blue-600">Voca Plane</span>
                    </div>
                    <div class="hidden sm:ml-6 sm:flex sm:space-x-8">
                        <a href="/pages/user/flights.html" class="border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">Search Flights</a>
                        <a href="/pages/user/transactions.html" class="border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">My Bookings</a>
                        <a href="#" class="border-blue-500 text-gray-900 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">Profile</a>
                    </div>
                </div>
                <div class="hidden sm:ml-6 sm:flex sm:items-center">
                    <button id="logoutBtn" class="bg-white p-1 rounded-full text-gray-400 hover:text-gray-500 focus:outline-none">
                        Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <main class="flex-grow max-w-7xl mx-auto py-10 sm:px-6 lg:px-8 w-full">
        <div class="bg-white shadow overflow-hidden sm:rounded-lg">
            <div class="px-4 py-5 sm:px-6 flex justify-between items-center">
                <div>
                    <h3 class="text-lg leading-6 font-medium text-gray-900">User Profile</h3>
                    <p class="mt-1 max-w-2xl text-sm text-gray-500">Personal details and application.</p>
                </div>
                <div id="roleBadge"></div>
            </div>
            <div class="border-t border-gray-200 px-4 py-5 sm:p-0">
                <dl class="sm:divide-y sm:divide-gray-200">
                    <div class="py-4 sm:py-5 sm:grid sm:grid-cols-3 sm:gap-4 sm:px-6">
                        <dt class="text-sm font-medium text-gray-500">Full name</dt>
                        <dd class="mt-1 text-sm text-gray-900 sm:mt-0 sm:col-span-2" id="profileName">Loading...</dd>
                    </div>
                    <div class="py-4 sm:py-5 sm:grid sm:grid-cols-3 sm:gap-4 sm:px-6">
                        <dt class="text-sm font-medium text-gray-500">Email address</dt>
                        <dd class="mt-1 text-sm text-gray-900 sm:mt-0 sm:col-span-2" id="profileEmail">Loading...</dd>
                    </div>
                    <div class="py-4 sm:py-5 sm:grid sm:grid-cols-3 sm:gap-4 sm:px-6">
                        <dt class="text-sm font-medium text-gray-500">Joined Date</dt>
                        <dd class="mt-1 text-sm text-gray-900 sm:mt-0 sm:col-span-2" id="profileJoined">Loading...</dd>
                    </div>
                </dl>
            </div>
        </div>

        <!-- Update Form -->
        <div class="mt-8 bg-white shadow sm:rounded-lg">
            <div class="px-4 py-5 sm:p-6">
                <h3 class="text-lg leading-6 font-medium text-gray-900">Update Profile</h3>
                <div class="mt-2 text-sm text-gray-500">
                    <p>Change your personal information or password.</p>
                </div>
                <form id="updateProfileForm" class="mt-5 sm:flex sm:items-center">
                    <div class="w-full sm:max-w-xs mb-2 sm:mb-0 mr-0 sm:mr-3">
                        <label for="updateName" class="sr-only">Name</label>
                        <input type="text" name="name" id="updateName" class="shadow-sm focus:ring-blue-500 focus:border-blue-500 block w-full sm:text-sm border-gray-300 rounded-md p-2 border" placeholder="New Name">
                    </div>
                    <div class="w-full sm:max-w-xs mb-2 sm:mb-0 mr-0 sm:mr-3">
                        <label for="updatePassword" class="sr-only">Password</label>
                        <input type="password" name="password" id="updatePassword" class="shadow-sm focus:ring-blue-500 focus:border-blue-500 block w-full sm:text-sm border-gray-300 rounded-md p-2 border" placeholder="New Password">
                    </div>
                    <button type="submit" class="mt-3 w-full inline-flex items-center justify-center px-4 py-2 border border-transparent shadow-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm transition-colors">
                        Save
                    </button>
                    <div id="updateMessage" class="ml-3 text-sm hidden"></div>
                </form>
            </div>
        </div>
    </main>

    <script type="module">
        import { userService } from '../../services/userService.js';
        import { deleteCookie } from '../../utils/cookie.js';

        async function loadProfile() {
            try {
                const response = await userService.getProfile();
                const user = response.data;
                
                document.getElementById('profileName').textContent = user.name;
                document.getElementById('profileEmail').textContent = user.email;
                document.getElementById('profileJoined').textContent = new Date(user.created_at).toLocaleDateString();
                
                document.getElementById('updateName').value = user.name;

                const roleBadge = document.getElementById('roleBadge');
                roleBadge.innerHTML = `<span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-green-100 text-green-800">${user.role.toUpperCase()}</span>`;
                
                if (user.role === 'admin' || user.role === 'super_admin') {
                    // Add admin link
                    const nav = document.querySelector('.sm\\:flex.sm\\:space-x-8');
                    const adminLink = document.createElement('a');
                    adminLink.href = '/pages/admin/dashboard.html';
                    adminLink.className = 'border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium text-pink-600';
                    adminLink.textContent = 'Admin Panel';
                    nav.appendChild(adminLink);
                }

            } catch (error) {
                console.error('Failed to load profile:', error);
                window.location.href = '/pages/user/login.html';
            }
        }

        document.getElementById('updateProfileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const updateName = document.getElementById('updateName').value;
            const updatePassword = document.getElementById('updatePassword').value;
            
            const req = {};
            if (updateName) req.name = updateName;
            if (updatePassword) req.password = updatePassword;

            const msgDiv = document.getElementById('updateMessage');
            try {
                await userService.updateProfile(req);
                msgDiv.textContent = "Profile updated successfully!";
                msgDiv.className = "ml-3 text-sm text-green-600";
                msgDiv.classList.remove('hidden');
                loadProfile(); // reload UI
            } catch (error) {
                msgDiv.textContent = error.message || "Failed to update profile";
                msgDiv.className = "ml-3 text-sm text-red-600";
                msgDiv.classList.remove('hidden');
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            deleteCookie('access_token');
            deleteCookie('refresh_token');
            window.location.href = '/pages/user/login.html';
        });

        // Initialize
        loadProfile();
    </script>
</body>
</html>
