<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Transaksi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
    </style>
</head>
<body class="min-h-screen pt-10 pb-20 px-4 sm:px-6 lg:px-8">
    <div class="max-w-3xl mx-auto space-y-6">
        
        <div>
            <a href="/pages/user/transactions.html" class="inline-flex items-center text-sm font-medium text-blue-600 hover:text-blue-500">
                &larr; Kembali ke Transaksi Saya
            </a>
        </div>

        <div class="bg-white shadow sm:rounded-lg overflow-hidden border-t-4 border-blue-500">
            <div class="px-4 py-5 sm:px-6 flex justify-between items-center">
                <div>
                    <h3 class="text-lg leading-6 font-medium text-gray-900">Detail Transaksi</h3>
                    <p class="mt-1 max-w-2xl text-sm text-gray-500" id="txCode">Memuat...</p>
                </div>
                <div>
                    <span id="txStatus" class="px-3 py-1 inline-flex text-sm leading-5 font-semibold rounded-full bg-gray-100 text-gray-800">
                        MEMUAT
                    </span>
                </div>
            </div>
            
            <div class="border-t border-gray-200 px-4 py-5 sm:px-6">
                <div class="mb-6">
                    <h4 class="text-md font-medium text-gray-900 mb-3 border-b pb-2">Informasi Penerbangan</h4>
                    <div id="flightDetails" class="text-sm text-gray-700 bg-gray-50 p-4 rounded-md border">
                        Memuat informasi...
                    </div>
                </div>

                <div class="mb-6">
                    <h4 class="text-md font-medium text-gray-900 mb-3 border-b pb-2">Penumpang</h4>
                    <ul id="passengersList" class="divide-y divide-gray-200 text-sm">
                        <li class="py-2 text-gray-500">Memuat data penumpang...</li>
                    </ul>
                </div>

                <div>
                    <h4 class="text-md font-medium text-gray-900 mb-3 border-b pb-2">Ringkasan Pembayaran</h4>
                    <div class="bg-gray-50 p-4 rounded-md border text-sm space-y-2">
                        <div class="flex justify-between">
                            <span class="text-gray-500">Harga Tiket</span>
                            <span class="font-medium text-gray-900" id="totalPrice">Rp 0</span>
                        </div>
                        <div class="flex justify-between text-green-600">
                            <span>Diskon Promo</span>
                            <span id="promoDiscount">- Rp 0</span>
                        </div>
                        <div class="flex justify-between pt-2 border-t mt-2">
                            <span class="font-bold text-gray-900">Total Bayar</span>
                            <span class="font-bold text-blue-600 text-lg" id="amountDue">Rp 0</span>
                        </div>
                    </div>

                    <div id="payAction" class="mt-6 flex flex-col sm:flex-row gap-4 justify-end hidden">
                        </div>
                </div>

            </div>
        </div>
    </div>

    <script type="module">
        import { transactionService } from '../../services/transactionService.js';

        const urlParams = new URLSearchParams(window.location.search);
        const txCode = urlParams.get('code');

        if (!txCode) {
            alert('Kode transaksi tidak ditemukan.');
            window.location.href = '/pages/user/transactions.html';
        }

        async function loadDetails() {
            try {
                const res = await transactionService.getTransactionByCode(txCode);
                
                // Menangani kemungkinan data berada di res.data atau res langsung
                const tx = res.data || res;

                if (!tx || (typeof tx === 'object' && Object.keys(tx).length === 0)) {
                    throw new Error('Data transaksi kosong atau tidak ditemukan.');
                }

                renderRecord(tx);
            } catch (err) {
                console.error('Error loading details:', err);
                alert('Gagal memuat data: ' + err.message);
                window.location.href = '/pages/user/transactions.html';
            }
        }

        function renderRecord(tx) {
            // 1. Update Header & Status (Sangat krusial untuk mencegah toLowerCase error)
            document.getElementById('txCode').textContent = `Ref Booking: ${tx.code || 'N/A'}`;
            
            const statusEl = document.getElementById('txStatus');
            const statusRaw = tx.status || 'pending'; // Nilai default jika status undefined
            const status = statusRaw.toLowerCase();
            
            statusEl.textContent = status.toUpperCase();
            statusEl.className = 'px-3 py-1 inline-flex text-sm leading-5 font-semibold rounded-full';
            
            if (status === 'success' || status === 'paid') {
                statusEl.classList.add('bg-green-100', 'text-green-800');
            } else if (status === 'pending' || status === 'unpaid') {
                statusEl.classList.add('bg-yellow-100', 'text-yellow-800');
            } else {
                statusEl.classList.add('bg-red-100', 'text-red-800');
            }

            // 2. Render Detail Penerbangan
            const f = tx.flight || {};
            document.getElementById('flightDetails').innerHTML = `
                <div class="flex justify-between items-center mb-2">
                    <span class="font-bold text-lg">${f.origin_code || '---'} &rarr; ${f.destination_code || '---'}</span>
                    <span class="font-medium bg-blue-100 text-blue-800 px-2 py-1 rounded text-xs">
                        ${f.airline_name || 'Maskapai Tidak Diketahui'}
                    </span>
                </div>
                <div class="grid grid-cols-2 gap-4 mt-2">
                    <div>
                        <span class="block text-gray-500 text-xs uppercase">Keberangkatan</span>
                        <span class="font-medium">${f.departure_time ? new Date(f.departure_time).toLocaleString('id-ID') : '-'}</span>
                    </div>
                    <div>
                        <span class="block text-gray-500 text-xs uppercase">Kedatangan</span>
                        <span class="font-medium">${f.arrival_time ? new Date(f.arrival_time).toLocaleString('id-ID') : '-'}</span>
                    </div>
                </div>
            `;

            // 3. Render Penumpang
            const pList = document.getElementById('passengersList');
            const items = tx.transaction_items || [];
            pList.innerHTML = items.length > 0 ? '' : '<li class="py-2 text-gray-500">Tidak ada data penumpang</li>';
            
            items.forEach(item => {
                pList.innerHTML += `
                    <li class="py-3 flex justify-between items-center">
                        <div>
                            <p class="font-medium text-gray-900">
                                ${item.passenger_name || 'Nama Penumpang'} 
                                <span class="text-xs text-gray-500 bg-gray-200 px-2 py-0.5 rounded ml-2">${item.class_name || 'Ekonomi'}</span>
                            </p>
                            <p class="text-xs text-gray-500 mt-1">Kursi: <span class="font-semibold text-gray-700">${item.seat_number || '-'}</span></p>
                        </div>
                        <div class="text-right text-sm">
                            <span class="font-medium">Rp ${(item.price || 0).toLocaleString('id-ID')}</span>
                        </div>
                    </li>
                `;
            });

            // 4. Render Harga
            const discount = tx.promo?.discount || 0;
            const totalPrice = tx.total_price || 0;
            const subtotal = totalPrice + discount;

            document.getElementById('totalPrice').textContent = `Rp ${subtotal.toLocaleString('id-ID')}`;
            document.getElementById('promoDiscount').textContent = `- Rp ${discount.toLocaleString('id-ID')}`;
            document.getElementById('amountDue').textContent = `Rp ${totalPrice.toLocaleString('id-ID')}`;

            // 5. Tombol Aksi (Hanya muncul jika status belum lunas)
            const actionDiv = document.getElementById('payAction');
            if (status === 'pending' || status === 'unpaid') {
                actionDiv.classList.remove('hidden');
                actionDiv.innerHTML = `
                    <button id="cancelBtn" class="px-6 py-2 border border-red-300 text-red-700 font-medium rounded-md hover:bg-red-50 transition-colors">
                        Batalkan Pesanan
                    </button>
                    ${tx.payment_url ? `
                        <a href="${tx.payment_url}" target="_blank" class="px-6 py-2 bg-blue-600 text-white font-medium rounded-md hover:bg-blue-700 shadow-sm transition-colors text-center">
                            Bayar Sekarang
                        </a>
                    ` : '<span class="text-sm text-gray-400 italic">Tautan pembayaran tidak tersedia</span>'}
                `;

                document.getElementById('cancelBtn').addEventListener('click', async () => {
                    if (confirm('Apakah Anda yakin ingin membatalkan pesanan ini?')) {
                        try {
                            await transactionService.cancelTransaction(tx.code);
                            alert('Pesanan berhasil dibatalkan.');
                            window.location.reload();
                        } catch (err) {
                            alert('Gagal membatalkan: ' + (err.message || 'Error tidak diketahui'));
                        }
                    }
                });
            }
        }

        loadDetails();
    </script>
</body>
</html>
