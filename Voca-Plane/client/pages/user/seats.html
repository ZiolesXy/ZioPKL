<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voca Plane - Select Seats</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
        .seat { width: 40px; height: 40px; display: inline-flex; align-items: center; justify-content: center; margin: 4px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; border: 2px solid transparent;}
        .seat.available { background-color: #e0f2fe; color: #0369a1; border-color: #bae6fd; }
        .seat.available:hover { background-color: #bae6fd; }
        .seat.selected { background-color: #2563eb; color: white; border-color: #1d4ed8; }
        .seat.unavailable { background-color: #f3f4f6; color: #9ca3af; cursor: not-allowed; border-color: #e5e7eb; }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <!-- Navbar -->
    <nav class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex">
                    <div class="flex-shrink-0 flex items-center">
                        <span class="text-xl font-bold text-blue-600">Voca Plane</span>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <main class="flex-grow max-w-7xl mx-auto py-10 sm:px-6 lg:px-8 w-full">
        <div class="mb-4">
            <a href="javascript:history.back()" class="inline-flex items-center text-sm font-medium text-blue-600 hover:text-blue-500">
                &larr; Back to Flights
            </a>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <!-- Seat Map -->
            <div class="md:col-span-2 bg-white shadow sm:rounded-lg">
                <div class="px-4 py-5 sm:px-6 border-b border-gray-200">
                    <h3 class="text-lg leading-6 font-medium text-gray-900" id="flightHeader">Select Seats</h3>
                </div>
                <div class="p-6 overflow-x-auto text-center" id="seatContainer">
                    <p class="text-gray-500">Loading seat map...</p>
                </div>
            </div>

            <!-- Selection Box -->
            <div class="bg-white shadow sm:rounded-lg h-fit sticky top-6">
                <div class="px-4 py-5 sm:px-6 border-b border-gray-200">
                    <h3 class="text-lg leading-6 font-medium text-gray-900">Your Selection</h3>
                </div>
                <div class="p-4">
                    <ul id="selectedSeatsList" class="divide-y divide-gray-200 text-sm">
                        <li class="py-2 text-gray-500">No seats selected</li>
                    </ul>
                    <div class="mt-6 flex justify-between font-bold text-lg border-t pt-4">
                        <span>Total:</span>
                        <span id="totalPrice">Rp 0</span>
                    </div>
                    <button id="checkoutBtn" disabled class="mt-6 w-full inline-flex justify-center py-3 px-4 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none disabled:bg-gray-400">
                        Continue to Checkout
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { flightService } from '../../services/flightService.js';

        const urlParams = new URLSearchParams(window.location.search);
        const flightId = urlParams.get('flightId');
        
        let flightClasses = {}; // map ClassType to Price
        let selectedSeats = []; // array of seat objects

        if (!flightId) {
            window.location.href = '/pages/user/flights.html';
        }

        async function init() {
            try {
                // Fetch full flight details including classes directly from the flight endpoint
                const flightResponse = await flightService.getFlightById(flightId);
                const flight = flightResponse.data;
                
                document.getElementById('flightHeader').textContent = `Select Seats - ${flight.airline.name} ${flight.flight_number}`;

                // Map classes 
                flight.classes.forEach(c => {
                    flightClasses[c.class_type] = c.price;
                });

                // Get seats
                const seatsResponse = await flightService.getFlightSeats(flightId);
                const seats = seatsResponse.data || [];
                
                renderSeats(seats, flight.total_rows, flight.total_columns);
            } catch (err) {
                document.getElementById('seatContainer').innerHTML = `<p class="text-red-500">${err.message || 'Error loading flight data'}</p>`;
            }
        }

        function renderSeats(seats, rows, cols) {
            const container = document.getElementById('seatContainer');
            container.innerHTML = '';
            
            // Build a seat map lookup by Code to easily display grid
            const seatMap = {};
            seats.forEach(s => seatMap[s.seat_code] = s);

            for (let r = 1; r <= rows; r++) {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'flex justify-center mb-2 items-center';
                
                // Add row number label
                const rowLabel = document.createElement('div');
                rowLabel.className = 'w-8 text-xs font-bold text-gray-400 mr-2 text-right';
                rowLabel.textContent = r;
                rowDiv.appendChild(rowLabel);

                for (let c = 1; c <= cols; c++) {
                    const colLetter = String.fromCharCode(64 + c); // 1->A, 2->B
                    const code = `${r}${colLetter}`;
                    const seatData = seatMap[code];

                    if (!seatData) {
                        // Empty space if seat doesn't exist logically
                        const empty = document.createElement('div');
                        empty.className = 'w-[40px] h-[40px] m-1';
                        rowDiv.appendChild(empty);
                        continue;
                    }

                    const seatBtn = document.createElement('div');
                    seatBtn.textContent = code;
                    
                    if (seatData.is_available) {
                        seatBtn.className = 'seat available shadow-sm';
                        seatBtn.title = `${code} (${seatData.class_type}) - Rp ${flightClasses[seatData.class_type]}`;
                        seatBtn.addEventListener('click', () => toggleSeat(seatData, seatBtn));
                    } else {
                        seatBtn.className = 'seat unavailable';
                        seatBtn.title = `Unavailable`;
                    }
                    
                    rowDiv.appendChild(seatBtn);

                    // Add aisle gap in the middle
                    if (c === Math.floor(cols / 2)) {
                        const aisle = document.createElement('div');
                        aisle.className = 'w-6';
                        rowDiv.appendChild(aisle);
                    }
                }
                container.appendChild(rowDiv);
            }
        }

        function toggleSeat(seatData, element) {
            const idx = selectedSeats.findIndex(s => s.id === seatData.id);
            if (idx > -1) {
                // Remove
                selectedSeats.splice(idx, 1);
                element.classList.remove('selected');
                element.classList.add('available');
            } else {
                // Add (limit to max 5 per transaction perhaps)
                if (selectedSeats.length >= 5) {
                    alert('Maximum 5 seats per booking allowed.');
                    return;
                }
                selectedSeats.push({
                    ...seatData,
                    price: flightClasses[seatData.class_type]
                });
                element.classList.remove('available');
                element.classList.add('selected');
            }
            updateSelectionUI();
        }

        function updateSelectionUI() {
            const list = document.getElementById('selectedSeatsList');
            const totalEl = document.getElementById('totalPrice');
            const btn = document.getElementById('checkoutBtn');

            if (selectedSeats.length === 0) {
                list.innerHTML = '<li class="py-2 text-gray-500">No seats selected</li>';
                totalEl.textContent = 'Rp 0';
                btn.disabled = true;
                return;
            }

            list.innerHTML = '';
            let total = 0;
            selectedSeats.forEach(s => {
                total += s.price;
                const li = document.createElement('li');
                li.className = 'py-2 flex justify-between';
                li.innerHTML = `<span><strong>${s.seat_code}</strong> <span class="text-xs text-gray-500 border border-gray-200 rounded px-1 ml-1">${s.class_type}</span></span> <span>Rp ${s.price.toLocaleString()}</span>`;
                list.appendChild(li);
            });

            totalEl.textContent = `Rp ${total.toLocaleString()}`;
            btn.disabled = false;
        }

        document.getElementById('checkoutBtn').addEventListener('click', () => {
            // Encode selection into URI and go to checkout page
            const seatCodes = selectedSeats.map(s => s.seat_code).join(',');
            window.location.href = `/pages/user/checkout.html?flightId=${flightId}&seats=${seatCodes}`;
        });

        init();
    </script>
</body>
</html>
