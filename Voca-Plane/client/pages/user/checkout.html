<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voca Plane - Checkout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <nav class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex">
                    <div class="flex-shrink-0 flex items-center">
                        <span class="text-xl font-bold text-blue-600">Voca Plane - Checkout</span>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-5xl mx-auto py-10 sm:px-6 lg:px-8 w-full grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="md:col-span-2 space-y-6">
            <div class="bg-white shadow sm:rounded-lg">
                <div class="px-4 py-5 sm:px-6 border-b border-gray-200">
                    <h3 class="text-lg leading-6 font-medium text-gray-900">Passenger Details</h3>
                    <p class="mt-1 max-w-2xl text-sm text-gray-500">Please provide details for all selected seats.</p>
                </div>
                <div class="p-6" id="passengersFormContainer">
                    <!-- Passenger forms generated here -->
                </div>
            </div>
        </div>
        
        <div class="space-y-6">
            <div class="bg-white shadow sm:rounded-lg top-6 sticky">
                <div class="px-4 py-5 sm:px-6 border-b border-gray-200">
                    <h3 class="text-lg leading-6 font-medium text-gray-900">Summary</h3>
                </div>
                <div class="p-6">
                    <ul class="divide-y divide-gray-200" id="summaryList"></ul>
                    
                    <div class="mt-6">
                        <label for="promoCode" class="block text-sm font-medium text-gray-700">Promo Code</label>
                        <div class="mt-1 flex rounded-md shadow-sm">
                            <input type="text" id="promoCode" class="flex-1 min-w-0 block w-full px-3 py-2 rounded-none rounded-l-md focus:ring-blue-500 focus:border-blue-500 sm:text-sm border-gray-300 border" placeholder="e.g. DISCOUNT10">
                        </div>
                    </div>

                    <button id="submitBooking" class="mt-6 w-full inline-flex justify-center py-3 px-4 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none">
                        Confirm & Pay
                    </button>
                    <div id="statusMessage" class="mt-4 text-center text-sm font-medium hidden"></div>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { flightService } from '../../services/flightService.js';
        import { transactionService } from '../../services/transactionService.js';

        const urlParams = new URLSearchParams(window.location.search);
        const flightId = urlParams.get('flightId');
        const seatCodes = urlParams.get('seats')?.split(',') || [];

        if (!flightId || seatCodes.length === 0) {
            window.location.href = '/pages/user/flights.html';
        }

        let flightInfo = null;

        async function init() {
            try {
                // Render forms
                const container = document.getElementById('passengersFormContainer');
                const summaryList = document.getElementById('summaryList');
                
                seatCodes.forEach((seat, idx) => {
                    // Build passenger inputs
                    const section = document.createElement('div');
                    section.className = idx > 0 ? "mt-8 border-t border-gray-100 pt-6" : "";
                    section.innerHTML = `
                        <h4 class="text-md font-medium text-gray-900 mb-4">Passenger ${idx + 1} - Seat <span class="bg-blue-100 text-blue-800 py-1 px-2 rounded">${seat}</span></h4>
                        <div class="grid grid-cols-1 gap-y-4 gap-x-4 sm:grid-cols-2">
                            <div>
                                <label class="block text-sm font-medium text-gray-700">Full Name</label>
                                <input type="text" id="p_name_${idx}" required class="mt-1 block w-full shadow-sm sm:text-sm focus:ring-blue-500 focus:border-blue-500 border-gray-300 rounded-md border p-2">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700">Nationality</label>
                                <input type="text" id="p_nat_${idx}" required placeholder="e.g. ID" class="mt-1 block w-full shadow-sm sm:text-sm focus:ring-blue-500 focus:border-blue-500 border-gray-300 rounded-md border p-2">
                            </div>
                            <div class="sm:col-span-2">
                                <label class="block text-sm font-medium text-gray-700">Passport / KTP Number</label>
                                <input type="text" id="p_pass_${idx}" required class="mt-1 block w-full shadow-sm sm:text-sm focus:ring-blue-500 focus:border-blue-500 border-gray-300 rounded-md border p-2">
                            </div>
                        </div>
                    `;
                    container.appendChild(section);

                    // Add to summary 
                    summaryList.innerHTML += `<li class="py-2 flex justify-between text-sm"><span>Seat ${seat}</span></li>`;
                });

            } catch (error) {
                console.error(error);
            }
        }

        document.getElementById('submitBooking').addEventListener('click', async () => {
            const passengers = [];
            const msgEl = document.getElementById('statusMessage');
            
            for (let i = 0; i < seatCodes.length; i++) {
                const name = document.getElementById(`p_name_${i}`).value;
                const nat = document.getElementById(`p_nat_${i}`).value;
                const pass = document.getElementById(`p_pass_${i}`).value;

                if (!name || !pass) {
                    alert('Please fill out all passenger details.');
                    return;
                }

                passengers.push({
                    full_name: name,
                    nationality: nat,
                    passport_no: pass,
                    seat_number: seatCodes[i]
                });
            }

            const promoCode = document.getElementById('promoCode').value;
            
            const payload = {
                flight_id: parseInt(flightId),
                passengers
            };
            
            if (promoCode) {
                payload.promo_code = promoCode;
            }

            const btn = document.getElementById('submitBooking');
            btn.disabled = true;
            btn.textContent = 'Processing...';
            msgEl.className = "mt-4 text-center text-sm font-medium hidden";

            try {
                const response = await transactionService.createTransaction(payload);
                const tx = response.data;
                // Redirect to payment URL
                if (tx && tx.payment_url) {
                    window.location.href = tx.payment_url;
                } else {
                    window.location.href = '/pages/user/transactions.html';
                }
            } catch (error) {
                msgEl.textContent = error.message || 'Transaction failed.';
                msgEl.className = "mt-4 text-center text-sm font-medium text-red-500";
                btn.disabled = false;
                btn.textContent = 'Confirm & Pay';
            }
        });

        init();
    </script>
</body>
</html>
