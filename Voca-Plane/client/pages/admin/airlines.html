<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Airlines</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }
    </style>
</head>

<body class="min-h-screen flex">
    <!-- Sidebar -->
    <div class="hidden md:flex md:w-64 md:flex-col md:fixed md:inset-y-0 bg-gray-900">
        <div class="flex-1 flex flex-col min-h-0 pt-5 pb-4 overflow-y-auto">
            <div class="flex items-center flex-shrink-0 px-4"><span
                    class="text-xl font-bold tracking-wider text-blue-400">Admin Panel</span></div>
            <nav class="mt-5 flex-1 px-2 space-y-1">
                <a href="/pages/admin/dashboard.html"
                    class="text-gray-300 hover:bg-gray-700 hover:text-white group flex items-center px-2 py-2 text-sm font-medium rounded-md">Dashboard</a>
                <a href="/pages/admin/flights.html"
                    class="text-gray-300 hover:bg-gray-700 hover:text-white group flex items-center px-2 py-2 text-sm font-medium rounded-md">Flights</a>
                <a href="/pages/admin/airlines.html"
                    class="bg-gray-800 text-white group flex items-center px-2 py-2 text-sm font-medium border-l-4 border-blue-500 rounded-md">Airlines</a>
                <a href="/pages/admin/airports.html"
                    class="text-gray-300 hover:bg-gray-700 hover:text-white group flex items-center px-2 py-2 text-sm font-medium rounded-md">Airports</a>
                <a href="/pages/admin/promos.html"
                    class="text-gray-300 hover:bg-gray-700 hover:text-white group flex items-center px-2 py-2 text-sm font-medium rounded-md">Promos</a>
                <a href="/pages/admin/users.html"
                    class="text-gray-300 hover:bg-gray-700 hover:text-white group flex items-center px-2 py-2 text-sm font-medium rounded-md">Users</a>
                <a href="/pages/user/profile.html"
                    class="text-gray-300 hover:bg-gray-700 hover:text-white group flex items-center px-2 py-2 text-sm font-medium rounded-md mt-8">←
                    Back</a>
            </nav>
        </div>
    </div>

    <!-- Main -->
    <div class="md:pl-64 flex flex-col flex-1">
        <main class="flex-1 py-6 max-w-7xl mx-auto px-4 sm:px-6 md:px-8 w-full">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-semibold text-gray-900">Manage Airlines</h1>
                <p id="showingText" class="text-sm text-gray-500"></p>
                <!-- Create Toggle -->
                <button onclick="openForm()"
                    class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700 transition">Add
                    Airline</button>
            </div>

            <!-- Add/Edit Form (Hidden by default) -->
            <div id="createForm" class="hidden bg-white shadow sm:rounded-lg p-6 mb-6">
                <h3 id="formTitle" class="text-lg font-medium text-gray-900 mb-4">Add Airline</h3>
                <form id="airlineForm" class="space-y-4 max-w-lg">
                    <div><label class="block text-sm font-medium text-gray-700">Name</label><input type="text" id="name"
                            required
                            class="mt-1 block w-full rounded-md border-gray-300 border shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500">
                    </div>
                    <div><label class="block text-sm font-medium text-gray-700">Code</label><input type="text" id="code"
                            required
                            class="mt-1 block w-full rounded-md border-gray-300 border shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500">
                    </div>
                    <div><label class="block text-sm font-medium text-gray-700">Logo (Base64 or URL structure per API)</label>
                        <input type="text" id="logo" required
                            class="mt-1 block w-full rounded-md border-gray-300 border shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500">
                    </div>
                    <div class="flex space-x-3 mt-4">
                        <button type="submit" id="submitBtn" class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700 shadow-sm">Save</button>
                        <button type="button" onclick="closeForm()" class="bg-gray-200 text-gray-700 px-4 py-2 rounded-md hover:bg-gray-300 shadow-sm">Cancel</button>
                    </div>
                </form>
            </div>

            <div class="bg-white shadow overflow-hidden sm:rounded-lg">
                <ul id="list" class="divide-y divide-gray-200"></ul>
            </div>            <!-- Pagination Control -->
            <div class="mt-4 flex items-center justify-center bg-white px-4 py-3 sm:px-6 shadow sm:rounded-lg">
                <nav id="paginationNav" class="isolate inline-flex -space-x-px rounded-md shadow-sm items-center" aria-label="Pagination">
                    <!-- Buttons will be injected here -->
                </nav>
            </div>
        </main>
    </div>

    <script type="module">
        import { adminService } from '../../services/adminService.js';

        let allData = [];
        let currentPage = 1;
        let totalItems = 0;
        const itemsPerPage = 8;

        async function loadData(page = 1) {
            try {
                const res = await adminService.getAirlines(page, itemsPerPage);
                allData = res.data || [];
                currentPage = page;
                
                if (res.meta) {
                    totalItems = res.meta.total || allData.length;
                    renderPagination(Math.ceil(totalItems / itemsPerPage));
                    
                    const start = (currentPage - 1) * itemsPerPage + 1;
                    const end = Math.min(currentPage * itemsPerPage, totalItems);
                    document.getElementById('showingText').textContent = `Showing ${start} to ${end} of ${totalItems} results`;
                } else {
                    totalItems = allData.length;
                    document.getElementById('paginationNav').innerHTML = '';
                    document.getElementById('showingText').textContent = '';
                }
                
                renderPage();
            } catch (err) {
                console.error(err);
                document.getElementById('list').innerHTML = `<li class="px-6 py-4 text-center text-red-500">${err.message || 'Error loading airlines'}</li>`;
            }
        }

        function renderPage() {
            const list = document.getElementById('list');
            list.innerHTML = '';

            if (allData.length === 0) {
                list.innerHTML = '<li class="px-6 py-4 text-center text-gray-500">No airlines found.</li>';
            } else {
                allData.forEach(item => {
                    const li = document.createElement('li');
                    li.className = 'px-6 py-4 flex justify-between items-center bg-white hover:bg-gray-50';
                    li.innerHTML = `
                        <div class="flex items-center space-x-4">
                            <img src="${item.logo_url}" class="h-10 w-10 rounded-full bg-gray-100 object-contain p-1" alt="${item.name}">
                            <div>
                                <p class="text-sm font-bold text-gray-900">${item.name}</p>
                                <p class="text-xs text-gray-500">${item.code}</p>
                            </div>
                        </div>
                        <div class="space-x-4">
                            <button id="edit-${item.id}" class="text-blue-600 hover:text-blue-900 text-sm font-medium">Edit</button>
                            <button id="del-${item.id}" class="text-red-600 hover:text-red-900 text-sm font-medium">Delete</button>
                        </div>
                    `;
                    list.appendChild(li);
                    document.getElementById(`edit-${item.id}`).onclick = () => window.openForm(item);
                    document.getElementById(`del-${item.id}`).onclick = () => window.delItem(item.id);
                });
            }
        }

        function renderPagination(totalPages) {
            const nav = document.getElementById('paginationNav');
            nav.innerHTML = '';

            // Previous
            const prevBtn = document.createElement('button');
            prevBtn.className = `relative inline-flex items-center px-4 py-2 text-sm font-medium border border-gray-300 rounded-l-md bg-white hover:bg-gray-50 text-gray-700 disabled:text-gray-400 disabled:cursor-not-allowed`;
            prevBtn.disabled = currentPage === 1;
            prevBtn.innerHTML = '&lsaquo; Previous';
            prevBtn.onclick = () => { if(currentPage > 1) loadData(currentPage - 1); };
            nav.appendChild(prevBtn);

            const windowSize = 1;
            const pages = [];
            pages.push(1);
            let start = Math.max(2, currentPage - windowSize);
            let end = Math.min(totalPages - 1, currentPage + windowSize);

            if (start > 2) pages.push('...');
            for (let i = start; i <= end; i++) pages.push(i);
            if (end < totalPages - 1) pages.push('...');
            if (totalPages > 1) pages.push(totalPages);

            pages.forEach(p => {
                if (p === '...') {
                    const span = document.createElement('span');
                    span.className = 'relative inline-flex items-center px-4 py-2 text-sm font-semibold text-gray-700 ring-1 ring-inset ring-gray-300';
                    span.textContent = '...';
                    nav.appendChild(span);
                } else {
                    const btn = document.createElement('button');
                    if (p === currentPage) {
                        btn.className = 'relative z-10 inline-flex items-center bg-blue-600 px-4 py-2 text-sm font-semibold text-white focus:z-20 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-blue-600 rounded-md mx-1';
                        btn.textContent = p;
                    } else {
                        btn.className = 'relative inline-flex items-center px-4 py-2 text-sm font-semibold text-gray-900 ring-1 ring-inset ring-gray-300 hover:bg-gray-50 focus:z-20 focus:outline-offset-0 mx-1 rounded-md';
                        btn.textContent = p;
                        btn.onclick = () => loadData(p);
                    }
                    nav.appendChild(btn);
                }
            });

            // Next
            const nextBtn = document.createElement('button');
            nextBtn.className = `relative inline-flex items-center px-4 py-2 text-sm font-medium border border-gray-300 rounded-r-md bg-white hover:bg-gray-50 text-gray-700 disabled:text-gray-400 disabled:cursor-not-allowed`;
            nextBtn.disabled = currentPage === totalPages;
            nextBtn.innerHTML = 'Next &rsaquo;';
            nextBtn.onclick = () => { if(currentPage < totalPages) loadData(currentPage + 1); };
            nav.appendChild(nextBtn);
        }

        let editId = null;

        window.openForm = function(item = null) {
            const form = document.getElementById('airlineForm');
            const container = document.getElementById('createForm');
            const submitBtn = document.getElementById('submitBtn');
            const title = document.getElementById('formTitle');

            if (item) {
                editId = item.id;
                document.getElementById('name').value = item.name;
                document.getElementById('code').value = item.code;
                document.getElementById('logo').value = item.image_url || '';
                submitBtn.textContent = 'Update';
                title.textContent = 'Edit Airline';
            } else {
                editId = null;
                form.reset();
                submitBtn.textContent = 'Save';
                title.textContent = 'Add Airline';
            }
            container.classList.remove('hidden');
            container.scrollIntoView({ behavior: 'smooth' });
        };

        window.closeForm = function() {
            document.getElementById('createForm').classList.add('hidden');
            editId = null;
        };

        document.getElementById('airlineForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const code = document.getElementById('code').value;
            const image_url = document.getElementById('logo').value;
            try {
                if (editId) {
                    await adminService.updateAirline(editId, { name, code, image_url });
                } else {
                    await adminService.createAirline({ name, code, image_url });
                }
                loadData(currentPage);
                closeForm();
            } catch (err) { alert(err.message); }
        });

        window.delItem = async function (id) {
            if (confirm('Delete?')) {
                try {
                    await adminService.deleteAirline(id);
                    loadData(currentPage);
                } catch (err) { alert(err.message); }
            }
        }

        loadData();
    </script>
</body>

</html>
