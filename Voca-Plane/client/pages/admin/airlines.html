<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Airlines</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }
    </style>
</head>

<body class="min-h-screen flex">
    <!-- Sidebar -->
    <div class="hidden md:flex md:w-64 md:flex-col md:fixed md:inset-y-0 bg-gray-900">
        <div class="flex-1 flex flex-col min-h-0 pt-5 pb-4 overflow-y-auto">
            <div class="flex items-center flex-shrink-0 px-4"><span
                    class="text-xl font-bold tracking-wider text-blue-400">Admin Panel</span></div>
            <nav class="mt-5 flex-1 px-2 space-y-1">
                <a href="/pages/admin/dashboard.html"
                    class="text-gray-300 hover:bg-gray-700 hover:text-white group flex items-center px-2 py-2 text-sm font-medium rounded-md">Dashboard</a>
                <a href="/pages/admin/flights.html"
                    class="text-gray-300 hover:bg-gray-700 hover:text-white group flex items-center px-2 py-2 text-sm font-medium rounded-md">Flights</a>
                <a href="/pages/admin/airlines.html"
                    class="bg-gray-800 text-white group flex items-center px-2 py-2 text-sm font-medium border-l-4 border-blue-500 rounded-md">Airlines</a>
                <a href="/pages/admin/airports.html"
                    class="text-gray-300 hover:bg-gray-700 hover:text-white group flex items-center px-2 py-2 text-sm font-medium rounded-md">Airports</a>
                <a href="/pages/admin/promos.html"
                    class="text-gray-300 hover:bg-gray-700 hover:text-white group flex items-center px-2 py-2 text-sm font-medium rounded-md">Promos</a>
                <a href="/pages/admin/users.html"
                    class="text-gray-300 hover:bg-gray-700 hover:text-white group flex items-center px-2 py-2 text-sm font-medium rounded-md">Users</a>
                <a href="/pages/user/profile.html"
                    class="text-gray-300 hover:bg-gray-700 hover:text-white group flex items-center px-2 py-2 text-sm font-medium rounded-md mt-8">←
                    Back</a>
            </nav>
        </div>
    </div>

    <!-- Main -->
    <div class="md:pl-64 flex flex-col flex-1">
        <main class="flex-1 py-6 max-w-7xl mx-auto px-4 sm:px-6 md:px-8 w-full">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-semibold text-gray-900">Manage Airlines</h1>
                <!-- Create Toggle -->
                <button onclick="openForm()"
                    class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700 transition">Add
                    Airline</button>
            </div>

            <!-- Add/Edit Form (Hidden by default) -->
            <div id="createForm" class="hidden bg-white shadow sm:rounded-lg p-6 mb-6">
                <h3 id="formTitle" class="text-lg font-medium text-gray-900 mb-4">Add Airline</h3>
                <form id="airlineForm" class="space-y-4 max-w-lg">
                    <div><label class="block text-sm font-medium text-gray-700">Name</label><input type="text" id="name"
                            required
                            class="mt-1 block w-full rounded-md border-gray-300 border shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500">
                    </div>
                    <div><label class="block text-sm font-medium text-gray-700">Code</label><input type="text" id="code"
                            required
                            class="mt-1 block w-full rounded-md border-gray-300 border shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500">
                    </div>
                    <div><label class="block text-sm font-medium text-gray-700">Logo (Base64 or URL structure per API)</label>
                        <input type="text" id="logo" required
                            class="mt-1 block w-full rounded-md border-gray-300 border shadow-sm p-2 focus:ring-blue-500 focus:border-blue-500">
                    </div>
                    <div class="flex space-x-3 mt-4">
                        <button type="submit" id="submitBtn" class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700 shadow-sm">Save</button>
                        <button type="button" onclick="closeForm()" class="bg-gray-200 text-gray-700 px-4 py-2 rounded-md hover:bg-gray-300 shadow-sm">Cancel</button>
                    </div>
                </form>
            </div>

            <div class="bg-white shadow overflow-hidden sm:rounded-lg">
                <ul id="list" class="divide-y divide-gray-200"></ul>
            </div>

            <!-- Pagination Control -->
            <div class="mt-4 flex items-center justify-between bg-white px-4 py-3 sm:px-6 shadow sm:rounded-lg">
                <div class="flex flex-1 justify-between sm:hidden">
                    <button id="prevBtnMobile"
                        class="relative inline-flex items-center rounded-md border border-gray-300 bg-white px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50">Previous</button>
                    <button id="nextBtnMobile"
                        class="relative ml-3 inline-flex items-center rounded-md border border-gray-300 bg-white px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50">Next</button>
                </div>
                <div class="hidden sm:flex sm:flex-1 sm:items-center sm:justify-between">
                    <div>
                        <p class="text-sm text-gray-700">
                            Showing <span class="font-medium" id="pageStart">0</span> to <span class="font-medium"
                                id="pageEnd">0</span> of <span class="font-medium" id="totalItems">0</span> results
                        </p>
                    </div>
                    <div>
                        <nav class="isolate inline-flex -space-x-px rounded-md shadow-sm" aria-label="Pagination">
                            <button id="prevBtn"
                                class="relative inline-flex items-center rounded-l-md px-2 py-2 text-gray-400 ring-1 ring-inset ring-gray-300 hover:bg-gray-50 focus:z-20 focus:outline-offset-0 disabled:bg-gray-100 disabled:cursor-not-allowed">
                                <span class="sr-only">Previous</span>
                                &larr; Prev
                            </button>
                            <button id="nextBtn"
                                class="relative inline-flex items-center rounded-r-md px-2 py-2 text-gray-400 ring-1 ring-inset ring-gray-300 hover:bg-gray-50 focus:z-20 focus:outline-offset-0 disabled:bg-gray-100 disabled:cursor-not-allowed">
                                Next &rarr;
                                <span class="sr-only">Next</span>
                            </button>
                        </nav>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { adminService } from '../../services/adminService.js';

        let allData = [];
        let currentPage = 1;
        const itemsPerPage = 8;

        async function loadAirlines() {
            try {
                const res = await adminService.getAirlines();
                allData = res.data || [];
                currentPage = 1;
                renderPage();
            } catch (err) { console.error(err); }
        }

        function renderPage() {
            const list = document.getElementById('list');
            list.innerHTML = '';

            const totalItems = allData.length;
            const totalPages = Math.ceil(totalItems / itemsPerPage) || 1;

            if (currentPage > totalPages) currentPage = totalPages;
            if (currentPage < 1) currentPage = 1;

            const startIdx = (currentPage - 1) * itemsPerPage;
            const endIdx = Math.min(startIdx + itemsPerPage, totalItems);

            const currentItems = allData.slice(startIdx, endIdx);

            if (currentItems.length === 0) {
                list.innerHTML = '<li class="px-6 py-4 text-center text-gray-500">No airlines found.</li>';
            } else {
                currentItems.forEach(item => {
                    list.innerHTML += `
                        <li class="px-6 py-4 flex justify-between items-center bg-white hover:bg-gray-50">
                            <div>
                                <p class="text-sm font-medium text-gray-900">${item.name} <span class="text-xs ml-2 text-gray-500">${item.code}</span></p>
                            </div>
                            <div class="space-x-4">
                                <button onclick='openForm(${JSON.stringify(item).replace(/'/g, "&#39;")})' class="text-blue-600 hover:text-blue-900 text-sm font-medium">Edit</button>
                                <button onclick="delAirline(${item.id})" class="text-red-600 hover:text-red-900 text-sm font-medium">Delete</button>
                            </div>
                        </li>
                    `;
                });
            }

            document.getElementById('totalItems').textContent = totalItems;
            document.getElementById('pageStart').textContent = totalItems === 0 ? 0 : startIdx + 1;
            document.getElementById('pageEnd').textContent = endIdx;

            const disablePrev = currentPage === 1;
            const disableNext = currentPage === totalPages;

            document.getElementById('prevBtn').disabled = disablePrev;
            document.getElementById('nextBtn').disabled = disableNext;
            document.getElementById('prevBtnMobile').disabled = disablePrev;
            document.getElementById('nextBtnMobile').disabled = disableNext;
        }

        document.getElementById('prevBtn').addEventListener('click', () => { if (currentPage > 1) { currentPage--; renderPage(); } });
        document.getElementById('nextBtn').addEventListener('click', () => { if (currentPage < Math.ceil(allData.length / itemsPerPage)) { currentPage++; renderPage(); } });
        document.getElementById('prevBtnMobile').addEventListener('click', () => { if (currentPage > 1) { currentPage--; renderPage(); } });
        document.getElementById('nextBtnMobile').addEventListener('click', () => { if (currentPage < Math.ceil(allData.length / itemsPerPage)) { currentPage++; renderPage(); } });

        try {
            const res = await adminService.getAirlines();
            const list = document.getElementById('list');
            list.innerHTML = '';
            (res.data || []).forEach(item => {
                list.innerHTML += `
                        <li class="px-6 py-4 flex justify-between items-center bg-white hover:bg-gray-50">
                            <div>
                                <p class="text-sm font-medium text-gray-900">${item.name} <span class="text-xs ml-2 text-gray-500">${item.code}</span></p>
                            </div>
                            <button onclick="delAirline(${item.id})" class="text-red-600 hover:text-red-900 text-sm font-medium">Delete</button>
                        </li>
                    `;
            });
        } catch (err) { console.error(err); }

        let editId = null;

        window.openForm = function(item = null) {
            const form = document.getElementById('airlineForm');
            const container = document.getElementById('createForm');
            const submitBtn = document.getElementById('submitBtn');
            const title = document.getElementById('formTitle');

            if (item) {
                editId = item.id;
                document.getElementById('name').value = item.name;
                document.getElementById('code').value = item.code;
                document.getElementById('logo').value = item.logo_url || '';
                submitBtn.textContent = 'Update';
                title.textContent = 'Edit Airline';
            } else {
                editId = null;
                form.reset();
                submitBtn.textContent = 'Save';
                title.textContent = 'Add Airline';
            }
            container.classList.remove('hidden');
            container.scrollIntoView({ behavior: 'smooth' });
        };

        window.closeForm = function() {
            document.getElementById('createForm').classList.add('hidden');
            editId = null;
        };

        document.getElementById('airlineForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const code = document.getElementById('code').value;
            const logo_url = document.getElementById('logo').value;
            try {
                if (editId) {
                    await adminService.updateAirline(editId, { name, code, logo_url });
                } else {
                    await adminService.createAirline({ name, code, logo_url });
                }
                loadAirlines();
                closeForm();
            } catch (err) { alert(err.message); }
        });

        window.delAirline = async function (id) {
            if (confirm('Delete?')) {
                try {
                    await adminService.deleteAirline(id);
                    loadAirlines();
                } catch (err) { alert(err.message); }
            }
        }

        loadAirlines();
    </script>
</body>

</html>
