<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Transactions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
    </style>
</head>
<body class="min-h-screen flex">
    <!-- Sidebar -->
    <div class="hidden md:flex md:w-64 md:flex-col md:fixed md:inset-y-0 bg-gray-900">
        <div class="flex-1 flex flex-col min-h-0 pt-5 pb-4 overflow-y-auto">
            <div class="flex items-center flex-shrink-0 px-4"><span class="text-xl font-bold tracking-wider text-blue-400">Admin Panel</span></div>
            <nav class="mt-5 flex-1 px-2 space-y-1">
                <a href="/pages/admin/dashboard.html" class="text-gray-300 hover:bg-gray-700 hover:text-white group flex items-center px-2 py-2 text-sm font-medium rounded-md">Dashboard</a>
                <a href="/pages/admin/transactions.html" class="bg-gray-800 text-white group flex items-center px-2 py-2 text-sm font-medium border-l-4 border-blue-500 rounded-md">Transactions</a>
                <a href="/pages/admin/flights.html" class="text-gray-300 hover:bg-gray-700 hover:text-white group flex items-center px-2 py-2 text-sm font-medium rounded-md">Flights</a>
                <a href="/pages/admin/airlines.html" class="text-gray-300 hover:bg-gray-700 hover:text-white group flex items-center px-2 py-2 text-sm font-medium rounded-md">Airlines</a>
                <a href="/pages/admin/airports.html" class="text-gray-300 hover:bg-gray-700 hover:text-white group flex items-center px-2 py-2 text-sm font-medium rounded-md">Airports</a>
                <a href="/pages/admin/promos.html" class="text-gray-300 hover:bg-gray-700 hover:text-white group flex items-center px-2 py-2 text-sm font-medium rounded-md">Promos</a>
                <a href="/pages/admin/users.html" class="text-gray-300 hover:bg-gray-700 hover:text-white group flex items-center px-2 py-2 text-sm font-medium rounded-md">Users</a>
                <a href="/pages/user/profile.html" class="text-gray-300 hover:bg-gray-700 hover:text-white group flex items-center px-2 py-2 text-sm font-medium rounded-md mt-8">← Back</a>
            </nav>
        </div>
    </div>

    <!-- Main -->
    <div class="md:pl-64 flex flex-col flex-1">
        <main class="flex-1 py-6 max-w-7xl mx-auto px-4 sm:px-6 md:px-8 w-full">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-semibold text-gray-900">System Transactions</h1>
            </div>

            <div class="bg-white shadow overflow-hidden sm:rounded-lg">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Transaction Code</th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">User</th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Flight</th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Total Price</th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                            <th scope="col" class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider border-l">Action</th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-gray-200" id="txBody">
                        <tr><td colspan="6" class="px-6 py-4 text-center text-gray-500">Loading...</td></tr>
                    </tbody>
                </table>
            </div>

            <!-- Pagination Control -->
            <div class="mt-4 flex items-center justify-between bg-white px-4 py-3 sm:px-6 shadow sm:rounded-lg">
                <div class="flex flex-1 justify-between sm:hidden">
                    <button id="prevBtnMobile" class="relative inline-flex items-center rounded-md border border-gray-300 bg-white px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50">Previous</button>
                    <button id="nextBtnMobile" class="relative ml-3 inline-flex items-center rounded-md border border-gray-300 bg-white px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50">Next</button>
                </div>
                <div class="hidden sm:flex sm:flex-1 sm:items-center sm:justify-between">
                    <div>
                        <p class="text-sm text-gray-700">
                            Showing <span class="font-medium" id="pageStart">0</span> to <span class="font-medium" id="pageEnd">0</span> of <span class="font-medium" id="totalItems">0</span> results
                        </p>
                    </div>
                    <div>
                        <nav class="isolate inline-flex -space-x-px rounded-md shadow-sm" aria-label="Pagination" id="paginationNav">
                            <button id="prevBtn" class="relative inline-flex items-center rounded-l-md px-2 py-2 text-gray-400 ring-1 ring-inset ring-gray-300 hover:bg-gray-50 focus:z-20 focus:outline-offset-0 disabled:bg-gray-100 disabled:cursor-not-allowed">
                                <span class="sr-only">Previous</span>
                                &larr; Prev
                            </button>
                            <!-- Number buttons later injected here via JS -->
                            <button id="nextBtn" class="relative inline-flex items-center rounded-r-md px-2 py-2 text-gray-400 ring-1 ring-inset ring-gray-300 hover:bg-gray-50 focus:z-20 focus:outline-offset-0 disabled:bg-gray-100 disabled:cursor-not-allowed">
                                Next &rarr;
                                <span class="sr-only">Next</span>
                            </button>
                        </nav>
                    </div>
                </div>
            </div>

            <!-- Detail Modal -->
            <div id="detailModal" class="hidden fixed inset-0 z-50 overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
                <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
                    <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" aria-hidden="true" onclick="closeDetails()"></div>
                    <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
                    <div class="inline-block align-bottom bg-white rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-2xl sm:w-full">
                        <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4" id="modalContent">
                            <!-- Dynamic content -->
                        </div>
                        <div class="bg-gray-50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse">
                            <button type="button" class="mt-3 w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm" onclick="closeDetails()">
                                Close
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module">
        import { adminService } from '../../services/adminService.js';

        let allData = [];
        let currentPage = 1;
        let totalItems = 0;
        const itemsPerPage = 10;

        async function loadTransactions(page = 1) {
            try {
                const response = await adminService.getTransactions(page, itemsPerPage);
                allData = response.data || [];
                currentPage = page;
                totalItems = response.meta.total || allData.length;
                renderPage();
            } catch (error) {
                console.error(error);
                document.getElementById('txBody').innerHTML = `<tr><td colspan="6" class="px-6 py-4 text-center text-red-500">${error.message || 'Error loading transactions'}</td></tr>`;
            }
        }

        function renderPage() {
            const tbody = document.getElementById('txBody');
            tbody.innerHTML = '';
            
            const totalPages = Math.ceil(totalItems / itemsPerPage) || 1;

            if (allData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="px-6 py-4 text-center text-gray-500">No transactions found.</td></tr>';
            } else {
                allData.forEach((tx, idx) => {
                    const row = document.createElement('tr');
                    const primaryPassenger = tx.transaction_items && tx.transaction_items.length > 0 ? tx.transaction_items[0].passenger_name : 'No Passenger';
                    
                    row.innerHTML = `
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="text-sm font-bold text-gray-900">${tx.code}</div>
                            <div class="text-xs text-gray-500">${new Date(tx.created_at).toLocaleString()}</div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="text-sm font-medium text-gray-900">${primaryPassenger}</div>
                            <div class="text-xs text-gray-500">${tx.transaction_items ? tx.transaction_items.length + ' Passengers' : ''}</div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="text-sm text-gray-900">${tx.flight ? tx.flight.flight_number : 'N/A'}</div>
                            <div class="text-xs text-gray-500">${tx.flight ? `${tx.flight.origin.code} > ${tx.flight.destination.code}` : ''}</div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span class="text-sm font-medium text-gray-900">Rp ${tx.total_price.toLocaleString()}</span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${getStatusColor(tx.payment_status)}">${tx.payment_status.toUpperCase()}</span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                            <button onclick="viewDetails(${idx})" class="text-indigo-600 hover:text-indigo-900">Details</button>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            }

            // Update pagination UI
            const startIdx = (currentPage - 1) * itemsPerPage;
            const endIdx = startIdx + allData.length;

            document.getElementById('totalItems').textContent = totalItems;
            document.getElementById('pageStart').textContent = totalItems === 0 ? 0 : startIdx + 1;
            document.getElementById('pageEnd').textContent = endIdx;

            const disablePrev = currentPage === 1;
            const disableNext = currentPage === totalPages;

            document.getElementById('prevBtnMobile').disabled = disablePrev;
            document.getElementById('nextBtnMobile').disabled = disableNext;
            
            renderPaginationButtons(totalPages);
        }

        function renderPaginationButtons(totalPages) {
            const nav = document.getElementById('paginationNav');
            nav.innerHTML = '';
            nav.className = 'isolate inline-flex -space-x-px rounded-md shadow-sm items-center';

            // Previous Button
            const prevBtn = document.createElement('button');
            prevBtn.className = `relative inline-flex items-center px-4 py-2 text-sm font-medium border border-gray-300 rounded-l-md bg-white hover:bg-gray-50 text-gray-700 disabled:text-gray-400 disabled:cursor-not-allowed`;
            prevBtn.disabled = currentPage === 1;
            prevBtn.innerHTML = '&lsaquo; Previous';
            prevBtn.onclick = () => { if(currentPage > 1) loadTransactions(currentPage - 1); };
            nav.appendChild(prevBtn);
            
            const windowSize = 1;
            const pages = [];

            pages.push(1);

            let start = Math.max(2, currentPage - windowSize);
            let end = Math.min(totalPages - 1, currentPage + windowSize);

            if (start > 2) {
                pages.push('...');
            }

            for (let i = start; i <= end; i++) {
                pages.push(i);
            }

            if (end < totalPages - 1) {
                pages.push('...');
            }

            if (totalPages > 1) {
                pages.push(totalPages);
            }

            pages.forEach(p => {
                if (p === '...') {
                    const span = document.createElement('span');
                    span.className = 'relative inline-flex items-center px-4 py-2 text-sm font-semibold text-gray-700 ring-1 ring-inset ring-gray-300';
                    span.textContent = '...';
                    nav.appendChild(span);
                } else {
                    const btn = document.createElement('button');
                    if (p === currentPage) {
                        btn.className = 'relative z-10 inline-flex items-center bg-blue-600 px-4 py-2 text-sm font-semibold text-white focus:z-20 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-blue-600 rounded-md mx-1';
                        btn.textContent = p;
                    } else {
                        btn.className = 'relative inline-flex items-center px-4 py-2 text-sm font-semibold text-gray-900 ring-1 ring-inset ring-gray-300 hover:bg-gray-50 focus:z-20 focus:outline-offset-0 mx-1 rounded-md';
                        btn.textContent = p;
                        btn.onclick = () => loadTransactions(p);
                    }
                    nav.appendChild(btn);
                }
            });

            // Next Button
            const nextBtn = document.createElement('button');
            nextBtn.className = `relative inline-flex items-center px-4 py-2 text-sm font-medium border border-gray-300 rounded-r-md bg-white hover:bg-gray-50 text-gray-700 disabled:text-gray-400 disabled:cursor-not-allowed`;
            nextBtn.disabled = currentPage === totalPages;
            nextBtn.innerHTML = 'Next &rsaquo;';
            nextBtn.onclick = () => { if(currentPage < totalPages) loadTransactions(currentPage + 1); };
            nav.appendChild(nextBtn);
        }

        window.viewDetails = function(index) {
            const tx = allData[index];
            const content = document.getElementById('modalContent');
            
            let passengersHtml = '';
            if (tx.transaction_items && tx.transaction_items.length > 0) {
                passengersHtml = tx.transaction_items.map((p, i) => `
                    <div class="border-t border-gray-200 pt-3 mt-3">
                        <p class="text-sm font-medium text-gray-900">Passenger ${i+1}: ${p.passenger_name}</p>
                        <p class="text-sm text-gray-500">Seat: ${p.seat_number} | Class: ${p.class_name} | Nationality: ${p.nationality}</p>
                    </div>
                `).join('');
            } else {
                passengersHtml = '<p class="text-sm text-gray-500">No passenger details available.</p>';
            }

            content.innerHTML = `
                <div class="sm:flex sm:items-start w-full">
                    <div class="mt-3 text-center sm:mt-0 sm:text-left w-full">
                        <h3 class="text-lg leading-6 font-medium text-gray-900 mb-4" id="modal-title">
                            Transaction Summary: ${tx.code}
                        </h3>
                        <div class="mt-2 space-y-2">
                            <p class="text-sm text-gray-800"><strong>Status:</strong> <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${getStatusColor(tx.payment_status)}">${tx.payment_status.toUpperCase()}</span></p>
                            <p class="text-sm text-gray-800"><strong>Flight:</strong> ${tx.flight ? tx.flight.flight_number + ' (' + tx.flight.origin.code + ' > ' + tx.flight.destination.code + ')' : 'N/A'}</p>
                            <p class="text-sm text-gray-800"><strong>Total Price:</strong> Rp ${tx.total_price.toLocaleString()}</p>
                            ${tx.promo_code ? `<p class="text-sm text-green-600"><strong>Promo:</strong> ${tx.promo_code} (-Rp ${tx.discount.toLocaleString()})</p>` : ''}
                            
                            <h4 class="mt-5 text-md font-semibold text-gray-900">Passengers</h4>
                            ${passengersHtml}
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('detailModal').classList.remove('hidden');
        };

        window.closeDetails = function() {
            document.getElementById('detailModal').classList.add('hidden');
        };

        function getStatusColor(status) {
            switch(status.toLowerCase()) {
                case 'settlement':
                case 'capture':
                case 'success':
                case 'paid':
                    return 'bg-green-100 text-green-800';
                case 'pending':
                case 'unpaid':
                    return 'bg-yellow-100 text-yellow-800';
                case 'cancel':
                case 'deny':
                case 'expire':
                case 'failure':
                    return 'bg-red-100 text-red-800';
                default:
                    return 'bg-gray-100 text-gray-800';
            }
        }

        document.getElementById('prevBtnMobile').addEventListener('click', () => { if(currentPage > 1) loadTransactions(currentPage - 1); });
        document.getElementById('nextBtnMobile').addEventListener('click', () => { if(currentPage < Math.ceil(totalItems / itemsPerPage)) loadTransactions(currentPage + 1); });

        loadTransactions();
    </script>
</body>
</html>
