<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Users</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
    </style>
</head>
<body class="min-h-screen flex">
    <!-- Sidebar -->
    <div class="hidden md:flex md:w-64 md:flex-col md:fixed md:inset-y-0 bg-gray-900">
        <div class="flex-1 flex flex-col min-h-0 pt-5 pb-4 overflow-y-auto">
            <div class="flex items-center flex-shrink-0 px-4"><span class="text-xl font-bold tracking-wider text-blue-400">Admin Panel</span></div>
            <nav class="mt-5 flex-1 px-2 space-y-1">
                <a href="/pages/admin/dashboard.html" class="text-gray-300 hover:bg-gray-700 hover:text-white group flex items-center px-2 py-2 text-sm font-medium rounded-md">Dashboard</a>
                <a href="/pages/admin/flights.html" class="text-gray-300 hover:bg-gray-700 hover:text-white group flex items-center px-2 py-2 text-sm font-medium rounded-md">Flights</a>
                <a href="/pages/admin/airlines.html" class="text-gray-300 hover:bg-gray-700 hover:text-white group flex items-center px-2 py-2 text-sm font-medium rounded-md">Airlines</a>
                <a href="/pages/admin/airports.html" class="text-gray-300 hover:bg-gray-700 hover:text-white group flex items-center px-2 py-2 text-sm font-medium rounded-md">Airports</a>
                <a href="/pages/admin/promos.html" class="text-gray-300 hover:bg-gray-700 hover:text-white group flex items-center px-2 py-2 text-sm font-medium rounded-md">Promos</a>
                <a href="/pages/admin/users.html" class="bg-gray-800 text-white group flex items-center px-2 py-2 text-sm font-medium border-l-4 border-blue-500 rounded-md">Users</a>
                <a href="/pages/user/profile.html" class="text-gray-300 hover:bg-gray-700 hover:text-white group flex items-center px-2 py-2 text-sm font-medium rounded-md mt-8">← Back</a>
            </nav>
        </div>
    </div>

    <!-- Main -->
    <div class="md:pl-64 flex flex-col flex-1">
        <main class="flex-1 py-6 max-w-7xl mx-auto px-4 sm:px-6 md:px-8 w-full">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-semibold text-gray-900">Manage Users</h1>
                <p id="showingText" class="text-sm text-gray-500"></p>
            </div>
            <div class="bg-white shadow overflow-hidden sm:rounded-lg">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Name/Email</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Role</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                            <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-gray-200" id="usersBody">
                        <tr><td colspan="4" class="px-6 py-4 text-center text-gray-500">Loading...</td></tr>
                    </tbody>
                </table>
            </div>

            <!-- Pagination Control -->
            <div class="mt-4 flex items-center justify-center bg-white px-4 py-3 sm:px-6 shadow sm:rounded-lg">
                <nav id="paginationNav" class="isolate inline-flex -space-x-px rounded-md shadow-sm items-center" aria-label="Pagination">
                    <!-- Buttons will be injected here -->
                </nav>
            </div>
        </main>
    </div>

    <script type="module">
        import { adminService } from '../../services/adminService.js';

        let allData = [];
        let currentPage = 1;
        let totalItems = 0;
        const itemsPerPage = 10;

        async function loadUsers(page = 1) {
            try {
                const response = await adminService.getUsers(page, itemsPerPage);
                allData = response.data || [];
                currentPage = page;
                
                if (response.meta) {
                    totalItems = response.meta.total || allData.length;
                    renderPagination(Math.ceil(totalItems / itemsPerPage));
                    
                    const start = (currentPage - 1) * itemsPerPage + 1;
                    const end = Math.min(currentPage * itemsPerPage, totalItems);
                    document.getElementById('showingText').textContent = `Showing ${start} to ${end} of ${totalItems} results`;
                } else {
                    totalItems = allData.length;
                    document.getElementById('paginationNav').innerHTML = '';
                    document.getElementById('showingText').textContent = '';
                }
                
                renderPage();
            } catch (error) {
                console.error(error);
                document.getElementById('usersBody').innerHTML = `<tr><td colspan="4" class="px-6 py-4 text-center text-red-500">${error.message || 'Error loading users'}</td></tr>`;
            }
        }

        function renderPage() {
            const tbody = document.getElementById('usersBody');
            tbody.innerHTML = '';
            
            if (allData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="px-6 py-4 text-center text-gray-500">No users found.</td></tr>';
            } else {
                allData.forEach(u => {
                    const row = document.createElement('tr');
                    const isBanned = u.is_banned;
                    
                    row.innerHTML = `
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="text-sm font-medium text-gray-900">${u.name}</div>
                            <div class="text-sm text-gray-500">${u.email}</div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-blue-100 text-blue-800">${u.role}</span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${isBanned ? 'bg-red-100 text-red-800' : 'bg-green-100 text-green-800'}">
                                ${isBanned ? 'Banned' : 'Active'}
                            </span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium space-x-2">
                            ${!isBanned ? `<button id="ban-${u.id}" class="text-red-600 hover:text-red-900">Ban</button>` : `<button id="unban-${u.id}" class="text-green-600 hover:text-green-900">Unban</button>`}
                        </td>
                    `;
                    tbody.appendChild(row);

                    if (!isBanned) {
                        document.getElementById(`ban-${u.id}`).onclick = () => window.banUser(u.id);
                    } else {
                        document.getElementById(`unban-${u.id}`).onclick = () => window.unbanUser(u.id);
                    }
                });
            }
        }

        function renderPagination(totalPages) {
            const nav = document.getElementById('paginationNav');
            nav.innerHTML = '';

            // Previous
            const prevBtn = document.createElement('button');
            prevBtn.className = `relative inline-flex items-center px-4 py-2 text-sm font-medium border border-gray-300 rounded-l-md bg-white hover:bg-gray-50 text-gray-700 disabled:text-gray-400 disabled:cursor-not-allowed`;
            prevBtn.disabled = currentPage === 1;
            prevBtn.innerHTML = '&lsaquo; Previous';
            prevBtn.onclick = () => { if(currentPage > 1) loadUsers(currentPage - 1); };
            nav.appendChild(prevBtn);

            const windowSize = 1;
            const pages = [];
            pages.push(1);
            let start = Math.max(2, currentPage - windowSize);
            let end = Math.min(totalPages - 1, currentPage + windowSize);

            if (start > 2) pages.push('...');
            for (let i = start; i <= end; i++) pages.push(i);
            if (end < totalPages - 1) pages.push('...');
            if (totalPages > 1) pages.push(totalPages);

            pages.forEach(p => {
                if (p === '...') {
                    const span = document.createElement('span');
                    span.className = 'relative inline-flex items-center px-4 py-2 text-sm font-semibold text-gray-700 ring-1 ring-inset ring-gray-300';
                    span.textContent = '...';
                    nav.appendChild(span);
                } else {
                    const btn = document.createElement('button');
                    if (p === currentPage) {
                        btn.className = 'relative z-10 inline-flex items-center bg-blue-600 px-4 py-2 text-sm font-semibold text-white focus:z-20 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-blue-600 rounded-md mx-1';
                        btn.textContent = p;
                    } else {
                        btn.className = 'relative inline-flex items-center px-4 py-2 text-sm font-semibold text-gray-900 ring-1 ring-inset ring-gray-300 hover:bg-gray-50 focus:z-20 focus:outline-offset-0 mx-1 rounded-md';
                        btn.textContent = p;
                        btn.onclick = () => loadUsers(p);
                    }
                    nav.appendChild(btn);
                }
            });

            // Next
            const nextBtn = document.createElement('button');
            nextBtn.className = `relative inline-flex items-center px-4 py-2 text-sm font-medium border border-gray-300 rounded-r-md bg-white hover:bg-gray-50 text-gray-700 disabled:text-gray-400 disabled:cursor-not-allowed`;
            nextBtn.disabled = currentPage === totalPages;
            nextBtn.innerHTML = 'Next &rsaquo;';
            nextBtn.onclick = () => { if(currentPage < totalPages) loadUsers(currentPage + 1); };
            nav.appendChild(nextBtn);
        }

        window.banUser = async function(id) {
            const reason = prompt("Enter ban reason:");
            if (!reason) return;
            try {
                await adminService.banUser(id, { reason });
                loadUsers(currentPage);
            } catch (err) { alert(err.message); }
        }

        window.unbanUser = async function(id) {
            try {
                await adminService.unbanUser(id);
                loadUsers(currentPage);
            } catch (err) { alert(err.message); }
        }

        loadUsers();
    </script>
</body>
</html>
