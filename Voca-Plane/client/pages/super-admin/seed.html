<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin - System Seed</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-xl shadow-lg border-t-4 border-red-500">
        <div>
            <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900">Database Seed</h2>
            <p class="mt-2 text-center text-sm text-gray-600">
                WARNING: This requires Super Admin role plus the App Password. For initial setup only.
            </p>
        </div>
        <form class="mt-8 space-y-6" id="seedForm">
            <div>
                <label for="appPassword" class="sr-only">App Password</label>
                <input id="appPassword" name="appPassword" type="password" required class="appearance-none rounded relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-red-500 focus:border-red-500 focus:z-10 sm:text-sm" placeholder="APP_PASSWORD">
            </div>

            <div id="error-message" class="text-red-500 text-sm hidden text-center"></div>
            <div id="success-message" class="text-green-500 text-sm hidden text-center">Data seeded successfully!</div>

            <div>
                <button type="submit" id="btn" class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-red-600 hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500">
                    Seed Database
                </button>
            </div>
            <div class="text-center pt-4">
                <a href="/pages/user/login.html" class="text-sm font-medium text-blue-600 hover:text-blue-500">Go to Login</a>
            </div>
        </form>
    </div>

    <script type="module">
        import { systemService } from '../../services/adminService.js';

        document.getElementById('seedForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const pass = document.getElementById('appPassword').value;
            const btn = document.getElementById('btn');
            
            const errorDiv = document.getElementById('error-message');
            const successDiv = document.getElementById('success-message');
            
            errorDiv.classList.add('hidden');
            successDiv.classList.add('hidden');

            btn.disabled = true;
            btn.textContent = 'Running seeders...';

            try {
                await systemService.seedData(pass);
                successDiv.classList.remove('hidden');
            } catch (error) {
                errorDiv.textContent = error.message || 'Seeding failed. Are you Super Admin with correct password?';
                errorDiv.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Seed Database';
            }
        });
    </script>
</body>
</html>
