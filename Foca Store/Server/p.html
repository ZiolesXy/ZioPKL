<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pembayaran Midtrans Snap</title>
    
    <script type="text/javascript"
      src="https://app.sandbox.midtrans.com/snap/snap.js"
      data-client-key="Mid-client-k1oEGopVA5MO9onm"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f7f6;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 350px;
            width: 100%;
        }
        h2 { color: #333; }
        p { color: #666; font-size: 0.9rem; margin-bottom: 1.5rem; }
        #pay-button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s ease;
            width: 100%;
        }
        #pay-button:hover {
            background-color: #0056b3;
        }
        #status-message {
            margin-top: 1rem;
            font-size: 0.8rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Checkout Cepat</h2>
        <p>Klik tombol di bawah untuk mencoba pembayaran dengan Snap Token Anda.</p>
        
        <button id="pay-button">Bayar Sekarang</button>
        
        <div id="status-message"></div>
    </div>

    <script type="text/javascript">
        const payButton = document.getElementById('pay-button');
        const statusMsg = document.getElementById('status-message');

        // Token yang Anda berikan tadi
        const MY_SNAP_TOKEN = 'b0530dd5-1ee4-4aed-8aa3-8f22fa48b379';

        payButton.onclick = function() {
            statusMsg.innerText = "Membuka jendela pembayaran...";
            statusMsg.style.color = "#007bff";

            // 2. Eksekusi Jendela Snap
            window.snap.pay(MY_SNAP_TOKEN, {
                onSuccess: function(result) {
                    console.log('Success:', result);
                    statusMsg.innerText = "Pembayaran Berhasil!";
                    statusMsg.style.color = "green";
                },
                onPending: function(result) {
                    console.log('Pending:', result);
                    statusMsg.innerText = "Menunggu Pembayaran...";
                    statusMsg.style.color = "orange";
                },
                onError: function(result) {
                    console.error('Error:', result);
                    statusMsg.innerText = "Pembayaran Gagal!";
                    statusMsg.style.color = "red";
                },
                onClose: function() {
                    statusMsg.innerText = "Anda menutup jendela pembayaran.";
                    statusMsg.style.color = "#666";
                }
            });
        };
    </script>

</body>
</html>
