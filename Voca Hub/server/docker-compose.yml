name: voca-hub

services:
  redis:
    image: redis:7
    ports:
      - "6380:6379"
    restart: unless-stopped

  minio:
    image: minio/minio
    ports:
      - "9002:9000" # API
      - "9003:9001" # Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

volumes:
  minio_data: