version: "3.9"

services:
  app:
    container_name: foca-app
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "${PORT:-8080}:8080"
    depends_on:
      - db
      - redis
    restart: unless-stopped

  db:
    container_name: foca-db
    image: postgres:16
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    container_name: foca-redis
    image: redis:7
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  db_data: